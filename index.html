<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>GM English School | Excellence in Education</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/open-book.png" />

  <!-- SEO -->
  <meta
    name="description"
    content="GM English School is dedicated to academic excellence, character building, and holistic development. Explore admissions, academics, achievements, facilities, and school activities."
  />

  <meta
    name="keywords"
    content="GM English School, English Medium School, Best School, School Admission, School Academics, School Activities, CBSE School, Hostel Facility, Education"
  />

  <meta name="author" content="GM English School" />
  <meta name="robots" content="index, follow" />
  <meta name="googlebot" content="index, follow" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://gmenglishschool.in/" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0B3D91" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="GM English School" />
  <meta property="og:title" content="GM English School | Excellence in Education" />
  <meta
    property="og:description"
    content="Providing quality education, modern facilities, experienced teachers, and all-round student development."
  />
  <meta property="og:url" content="https://gmenglishschool.in/" />

  <!-- Replace with your actual image -->
  <meta
    property="og:image"
    content="https://gmenglishschool.in/og-image.jpg"
  />

  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta
    name="twitter:title"
    content="GM English School | Excellence in Education"
  />
  <meta
    name="twitter:description"
    content="Academic excellence, holistic development, and a bright future for every student."
  />
  <meta
    name="twitter:image"
    content="https://gmenglishschool.in/og-image.jpg"
  />

  <!-- Geo -->
  <meta name="geo.region" content="IN" />
  <meta name="geo.country" content="India" />

  <!-- School Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "School",
    "name": "GM English School",
    "url": "https://gmenglishschool.in",
    "logo": "https://gmenglishschool.in/favicon.svg",
    "description": "GM English School provides quality education, academic excellence, modern facilities, and holistic student development.",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "IN"
    }
  }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
